<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 190" role="img" aria-label="Vertex Nirmaan — Trust, Expertise, Experience">
  <!-- Mark: rooflines, chimney, window, baseline -->
  <g fill="none" stroke="#ED7D31" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22,116 78,58 134,116"/>
    <polyline points="96,116 120,46 176,116"/>
  </g>
  <!-- chimney -->
  <rect x="46" y="66" width="11" height="22" fill="#ED7D31"/>
  <!-- window -->
  <rect x="61" y="90" width="11" height="11" fill="#ED7D31"/>
  <rect x="76" y="90" width="11" height="11" fill="#ED7D31"/>
  <rect x="61" y="104" width="11" height="11" fill="#ED7D31"/>
  <rect x="76" y="104" width="11" height="11" fill="#ED7D31"/>
  <!-- baseline -->
  <rect x="14" y="150" width="160" height="8" rx="4" fill="#58595B"/>

  <!-- Wordmark -->
  <text x="202" y="84" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="60" letter-spacing="8" fill="#58595B">VERTEX</text>
  <text x="202" y="140" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="60" letter-spacing="5" fill="#ED7D31">NIRMAAN</text>

  <!-- Tagline -->
  <text x="204" y="172" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="18.5" letter-spacing="1.2">
    <tspan fill="#ED7D31">T</tspan><tspan fill="#58595B">rust</tspan>
    <tspan fill="#58595B" dx="6">&#8226;</tspan>
    <tspan fill="#ED7D31" dx="6">E</tspan><tspan fill="#58595B">xpertise</tspan>
    <tspan fill="#58595B" dx="6">&#8226;</tspan>
    <tspan fill="#ED7D31" dx="6">E</tspan><tspan fill="#58595B">xperience</tspan>
  </text>
</svg>
